# fly.toml app configuration file generated for ticket-classifier on 2026-06-25T23:53:07Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ticket-classifier'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 7999
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
